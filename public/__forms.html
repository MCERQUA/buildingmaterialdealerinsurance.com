<!DOCTYPE html>
<html>
  <head><title>Netlify Form Declarations</title></head>
  <body>
    <!-- Quote form declaration for Netlify form detection -->
    <form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote" />
      <input name="bot-field" type="hidden" />
      <input name="name" type="text" />
      <input name="businessName" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <select name="state"></select>
      <select name="dealerType"></select>
      <select name="primaryCoverage"></select>
      <select name="inventoryValue"></select>
      <textarea name="message"></textarea>
    </form>

    <!-- Contact form declaration for Netlify form detection -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" type="hidden" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <input name="subject" type="text" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
